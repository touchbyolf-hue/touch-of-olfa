<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion admin - Touch by Olfa</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-card">
      <h2>Connexion admin</h2>
      <form id="loginForm">
        <label>Adresse email</label>
        <input type="email" name="email" placeholder="Email admin" required />

        <label>Mot de passe</label>
        <div class="password-wrap">
          <input type="password" id="passwordInput" name="password" placeholder="Mot de passe" required />
        </div>

        <button type="submit">Se connecter</button>
      </form>
      <p id="message" class="message"></p>
      <p class="message">Créez l'utilisateur admin dans la console Firebase puis utilisez ces identifiants.</p>
    </div>
    <script type="module" src="auth.js"></script>
  </body>
</html>
